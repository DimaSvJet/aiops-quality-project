apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: grafana
  namespace: infra-tools

spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 8.5.12
    helm:
      values: |
        service:
          type: ClusterIP

        adminUser: admin
        adminPassword: admin

        persistence:
          enabled: false

        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 250m

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
