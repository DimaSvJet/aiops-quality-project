apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-quality-service
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: https://github.com/DimaSvJet/aiops-quality-project.git
    targetRevision: master
    path: helm
  destination:
    server: https://kubernetes.default.svc
    namespace: application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true