apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name | quote }}
  labels:
    app: {{ .Chart.Name | quote }}
spec:
  type: {{ .Values.service.type | quote }}
  selector:
    app: {{ .Chart.Name | quote }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
